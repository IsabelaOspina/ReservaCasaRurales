spring.application.name=ReservaCasaRurales

# allowPublicKeyRetrieval: necesario con caching_sha2_password (error "RSA public key is not available client side")
spring.datasource.url=jdbc:mariadb://localhost:3306/gestion_reservas?allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# MariaDBDialect puede emitir "ALTER TABLE IF EXISTS ..." incompatible con MySQL 8; usar MySQLDialect si falla el DDL en arranque.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Si el arranque falla con "Port 8080 was already in use", cierra la otra instancia o descomenta:
# server.port=8081

logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.stat=OFF
